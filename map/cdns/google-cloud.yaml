# Fenceline CDN Reference — Google Cloud
# Source: https://www.gstatic.com/ipranges/cloud.json
# Last verified: 2026-03-31

id: google_cloud
name: Google Cloud
asn: AS15169

used_by:
  - go_modules  # proxy.golang.org, sum.golang.org, storage.googleapis.com

known_prefixes:
  # Go module proxy and checksum services resolve to 142.250.x.x
  # These are Google-owned ranges shared across many services
  - "142.250.0.0/15 (Google general)"

ipv6_prefixes:
  # Sample -- 10 of 48 total prefixes. Full list at source_url below.
  - 2600:1900:4000::/44
  - 2600:1900:4010::/44
  - 2600:1900:4020::/44
  - 2600:1900:4030::/44
  - 2600:1900:4040::/44
  - 2600:1900:4050::/44
  - 2600:1900:4060::/44
  - 2600:1900:4070::/44
  - 2600:1900:4080::/44
  - 2600:1900:4090::/44

source_url: "https://www.gstatic.com/ipranges/cloud.json"
notes: >
  Google Cloud IP ranges are very large and shared across all GCP services.
  142.250.x.x ranges are used by proxy.golang.org and related Go services.
  storage.googleapis.com is the critical hidden dependency -- Go's module
  proxy returns 302 redirects to signed GCS URLs. Firewalls must allow
  storage.googleapis.com for Go modules to work.
  The cloud.json file is the authoritative source for GCP ranges.
  Sigstore services (used by npm provenance) also run on Google Cloud
  under AS396982 (Google LLC).
