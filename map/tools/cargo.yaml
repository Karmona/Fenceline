# Fenceline Deep Map — cargo / crates.io
# Source: public DNS, Fastly/AWS IP ranges, cargo source code
# Last verified: 2026-03-31

id: cargo_crates
description: "Rust package manager (cargo) + crates.io registry"
expected_processes: ["cargo", "rustc"]

primary_domains:
  - domain: crates.io
    purpose: "Web UI + API (not the primary download path)"
    ips:
      - 3.169.71.16
      - 3.169.71.66
      - 3.169.71.117
      - 3.169.71.127
    cdn_provider: "AWS CloudFront"
    asn: AS16509
    port: 443

  - domain: static.crates.io
    purpose: "Crate tarball downloads (primary download CDN)"
    cname: "fastly-static.crates.io -> dualstack.k.sni.global.fastly.net"
    ips:
      - 199.232.142.137
    cdn_provider: Fastly
    asn: AS54113
    cdn_range: "199.232.0.0/16 (Fastly shared)"
    port: 443

  - domain: index.crates.io
    purpose: "Sparse registry index (package metadata, since cargo 1.68+)"
    cname: "fastly-index.crates.io -> dualstack.k.sni.global.fastly.net"
    ips:
      - 199.232.142.137
    cdn_provider: Fastly
    asn: AS54113
    port: 443

tls_certificates:
  crates.io:
    sha256: "C9:42:14:41:D1:10:9C:F5:AA:0E:A1:5F:85:1C:F7:1C:02:BD:08:20:85:7F:C4:0F:EE:11:75:68:45:C3:70:E2"
    issuer: "Amazon RSA 2048 M04"
    valid_from: "2026-01-16"
    valid_until: "2027-02-14"
    observed: "2026-03-31"
  static.crates.io:
    sha256: "55:C0:D3:6F:5E:32:FE:E9:33:CA:90:1F:8F:83:23:54:6B:DB:4E:2A:8A:55:53:E2:97:71:53:BF:54:1E:37:9F"
    issuer: "GlobalSign Atlas R3 DV TLS CA 2025 Q3"
    valid_from: "2025-09-03"
    valid_until: "2026-10-05"
    observed: "2026-03-31"

port: 443
uploads_during_install: false

telemetry:
  enabled: false
  notes: >
    cargo sends NO telemetry. Sends User-Agent with cargo version.
    Download counting is done server-side from CDN access logs.

known_mirrors:
  - rsproxy.cn   # China mirror (ByteDance)

notes: >
  Since March 2024, cargo downloads directly from static.crates.io CDN.
  Sparse index (index.crates.io) replaced the git-based index as default.
  File hosting donated by AWS. CDN donated by Fastly.
  ~1.6 PB/month served from static.crates.io, ~740 TB from index.crates.io.
